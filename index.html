<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TMO USA Command Portal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>TMO USA Command Portal</h1>

    <div class="tabs">

        <button class="tab-btn active" onclick="showTab('deleteTab')">
            ENM Delete
        </button>

        <button class="tab-btn" onclick="showTab('addTab')">
            ENM Add
        </button>

    </div>

    <!-- ENM DELETE -->

    <div id="deleteTab" class="tab-content active">

        <h2>ENM Node Delete</h2>

        <input type="text" id="deleteSite"
        placeholder="Enter Site ID">

        <button onclick="generateDelete()">
            Generate Commands
        </button>

        <button onclick="copyOutput('deleteOutput')">
            Copy
        </button>

        <pre id="deleteOutput"></pre>

    </div>

    <!-- ENM ADD -->

    <div id="addTab" class="tab-content">

        <h2>ENM Node Add</h2>

        <input type="text"
        id="addSite"
        placeholder="Enter Site ID">

        <input type="text"
        id="ipAddress"
        placeholder="Enter IP Address">

        <input type="text"
        id="timeZone"
        placeholder="Enter Time Zone">

        <button onclick="generateAdd()">
            Generate Commands
        </button>

        <button onclick="copyOutput('addOutput')">
            Copy
        </button>

        <pre id="addOutput"></pre>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
