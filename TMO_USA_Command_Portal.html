<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMO USA Command Portal</title>

<style>

body{
    margin:0;
    padding:0;
    background:#020617;
    color:white;
    font-family:Arial;
}

.container{
    width:90%;
    margin:auto;
    padding:40px;
}

h1{
    text-align:center;
    color:#00d4ff;
    font-size:50px;
    margin-bottom:40px;
}

.tabs{
    display:flex;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.tab-btn{
    background:#111827;
    color:white;
    border:none;
    padding:16px 28px;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

.tab-btn.active{
    background:#06b6d4;
    color:black;
}

.tab-content{
    display:none;
    background:#0f172a;
    padding:40px;
    border-radius:20px;
}

.tab-content.active{
    display:block;
}

h2{
    color:white;
    margin-bottom:30px;
    font-size:36px;
}

h3{
    margin-top:25px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:18px;
    margin-bottom:20px;
    border-radius:12px;
    border:1px solid #334155;
    background:#0b132b;
    color:white;
    font-size:18px;
    box-sizing:border-box;
}

textarea{
    width:100%;
    min-height:220px;
    padding:18px;
    margin-bottom:25px;
    border-radius:12px;
    border:1px solid #334155;
    background:#0b132b;
    color:white;
    font-size:14px;
    box-sizing:border-box;
    font-family:Consolas;
    line-height:1.5;
}

.btn-row{
    display:flex;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

button{
    background:#06b6d4;
    border:none;
    padding:16px 26px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

pre{
    background:black;
    padding:25px;
    border-radius:12px;
    overflow:auto;
    white-space:pre-wrap;
    font-size:15px;
    line-height:1.7;
    color:#00ff88;
}

</style>

</head>

<body>

<div class="container">

<h1>TMO USA Command Portal</h1>

<div class="tabs">

<button class="tab-btn active"
onclick="showTab('deleteTab', this)">
ENM Delete
</button>

<button class="tab-btn"
onclick="showTab('addTab', this)">
ENM Add
</button>

<button class="tab-btn"
onclick="showTab('mappingTab', this)">
RI Mapping / Radio Swap
</button>

</div>



<!-- =========================
ENM DELETE
========================= -->

<div id="deleteTab"
class="tab-content active">

<h2>ENM Node Delete</h2>

<input type="text"
id="deleteSite"
placeholder="Enter Site ID">

<div class="btn-row">

<button onclick="generateDelete()">
Generate Commands
</button>

<button onclick="copyText('deleteOutput')">
Copy
</button>

</div>

<pre id="deleteOutput"></pre>

</div>




<!-- =========================
ENM ADD
========================= -->

<div id="addTab"
class="tab-content">

<h2>ENM Node Add</h2>

<input type="text"
id="addSite"
placeholder="Enter Site ID">

<input type="text"
id="ipAddress"
placeholder="Enter IP Address">

<input type="text"
id="timeZone"
placeholder="Enter Time Zone">

<div class="btn-row">

<button onclick="generateAdd()">
Generate Commands
</button>

<button onclick="copyText('addOutput')">
Copy
</button>

</div>

<pre id="addOutput"></pre>

</div>




<!-- =========================
RI MAPPING
========================= -->

<div id="mappingTab"
class="tab-content">

<h2>RI Port Mapping & Radio Swap Check</h2>

<h3>Pre BB1 Data</h3>

<textarea id="preBB1"
placeholder="Paste PRE BB1 hget rilink riport + hget fi prod output"></textarea>

<h3>Pre BB2 Data</h3>

<textarea id="preBB2"
placeholder="Paste PRE BB2 hget rilink riport + hget fi prod output"></textarea>

<h3>Pre BB3 Data (Optional / NA)</h3>

<textarea id="preBB3"
placeholder="Paste PRE BB3 output OR type NA"></textarea>

<h3>Post G3 BB Data</h3>

<textarea id="postBB"
placeholder="Paste POST G3 BB hget rilink riport + hget fi prod output"></textarea>

<div class="btn-row">

<button onclick="generateMapping()">
Generate RI Mapping
</button>

<button onclick="checkRadioSwap()">
Check Radio Swap
</button>

<button onclick="copyText('mappingOutput')">
Copy Mapping
</button>

<button onclick="copyText('swapOutput')">
Copy Swap
</button>

</div>

<h3>RI Port Mapping</h3>

<pre id="mappingOutput"></pre>

<h3>Radio Swap Check</h3>

<pre id="swapOutput"></pre>

</div>

</div>




<script>

/* =========================
TAB SWITCH
========================= */

function showTab(tabId, btn){

    let tabs =
    document.querySelectorAll(".tab-content");

    tabs.forEach(tab => {
        tab.classList.remove("active");
    });

    document
    .getElementById(tabId)
    .classList.add("active");

    let buttons =
    document.querySelectorAll(".tab-btn");

    buttons.forEach(button => {
        button.classList.remove("active");
    });

    btn.classList.add("active");
}



/* =========================
COPY FUNCTION
========================= */

function copyText(id){

    let text =
    document.getElementById(id).innerText;

    navigator.clipboard.writeText(text);

    alert("Copied Successfully");
}



/* =========================
DELETE COMMAND
========================= */

function generateDelete(){

    let site =
    document.getElementById("deleteSite").value;

    let commands = `

cmedit get *${site}* FmAlarmsupervision.* ; Inventorysupervision.* ; pmFunction.*;cmNodeHeartbeatsupervision.*; cmFunction.* -t

cmedit set NetworkElement=${site},CmNodeHeartbeatSupervision=1 active=false

cmedit set NetworkElement=${site},InventorySupervision=1 active=false

fmedit set ${site} FmAlarmSupervision alarmSupervisionState=false

cmedit set NetworkElement=${site},PmFunction=1 pmEnabled=false

cmedit action NetworkElement=${site},CmFunction=1 deleteNrmDataFromEnm

cmedit delete NetworkElement=${site} –ALL --force

cmedit get NetworkElement=${site}

ap order -nv file:${site}.zip

ap status -n ${site}

`;

    document.getElementById("deleteOutput")
    .innerText = commands;
}



/* =========================
ADD COMMAND
========================= */

function generateAdd(){

    let site =
    document.getElementById("addSite").value;

    let ip =
    document.getElementById("ipAddress").value;

    let zone =
    document.getElementById("timeZone").value;

    let commands = `

cmedit create NetworkElement=${site} networkElementId=${site}, neType=RadioNode, ossPrefix="SubNetwork=ONRM_ROOT_MO,SubNetwork=Bloomfield,MeContext=${site}" -ns=OSS_NE_DEF -v=2.0.0

cmedit create NetworkElement=${site},ComConnectivityInformation=1 ComConnectivityInformationId=1, transportProtocol=TLS, ipAddress="${ip}", port=6513, snmpSecurityName=defaultsnmpuser, snmpVersion=SNMP_V3, snmpSecurityLevel=NO_AUTH_NO_PRIV -ns=COM_MED -v=1.1.0

secadm credentials create -sn prbs -sp "@WtIwQ-Bo2m0" -n ${site}

cmedit set NetworkElement=${site} timeZone=${zone}

cmedit set NetworkElement=${site} managementState=NORMAL

alarm enable ${site}

cmedit set NetworkElement=${site},SecurityFunction=1,NetworkElementSecurity=1 algorithmAndKeySize=RSA_2048, enrollmentMode=CMPv2_VC

cmedit set NetworkElement=${site},CmNodeHeartbeatSupervision=1 active=true

cmedit set NetworkElement=${site},InventorySupervision=1 active=true

fmedit set ${site} FmAlarmSupervision alarmSupervisionState=true

cmedit set NetworkElement=${site},PmFunction=1 pmEnabled=true

`;

    document.getElementById("addOutput")
    .innerText = commands;
}


function generateMapping(){

    let pre1 =
    document.getElementById("preBB1").value;

    let pre2 =
    document.getElementById("preBB2").value;

    let pre3 =
    document.getElementById("preBB3").value;

    let post =
    document.getElementById("postBB").value;

    let output = "";



    /* =========================
    PARSE DATA
    ========================= */

    function parseData(text){

        let lines = text.split('\n');

        let mappings = [];



        /* =========================
        DYNAMIC FRU MAP
        Supports:
        - Baseband
        - RAN Processor
        ========================= */

        let fruMap = {};



        lines.forEach(line => {

            if(
                line.includes("FieldReplaceableUnit=")
                &&
                (
                    line.includes("Baseband")
                    ||
                    line.includes("RAN Processor")
                )
            ){

                /*
                Examples:

FieldReplaceableUnit=1 Baseband 6648 KDU1370015/11 R3A/B 20201128 E23C159282

FieldReplaceableUnit=BB-01 Baseband 6630 KDU137848/11 R3B 20200709 B070314453

FieldReplaceableUnit=XMU03-1-7 Baseband R503 KDU 137 949/1 R2A 20170328 CD3Q735570

FieldReplaceableUnit=1 RAN Processor 6651 KDU1370093/11 R2B 20230422 EA2A675780
                */

                let match =
                line.match(
/FieldReplaceableUnit=([A-Z0-9\-]+)\s+(Baseband|RAN Processor)\s+([A-Z0-9 ]+)\s+(KDU[0-9 \/A-Z]+)\s+[A-Z0-9\/]+\s+[0-9]+\s+([A-Z0-9]+)/i
                );



                if(match){

                    let fru =
                    match[1]
                    .trim();



                    let category =
                    match[2]
                    .trim();



                    let model =
                    match[3]
                    .trim()
                    .replace(/\s+/g,' ');



                    let productName =
                    `${category} ${model}`;



                    let productNumber =
                    match[4]
                    .trim()
                    .replace(/\s+/g,'');



                    productNumber =
                    productNumber.split('/')[0];



                    let serialNumber =
                    match[5]
                    .trim();



                    let bb =
                    `${productName} ${serialNumber}`;



                    fruMap[fru] = {

                        display:
                        bb,

                        productName:
                        productName,

                        serialNumber:
                        serialNumber

                    };
                }
            }

        });




        /* =========================
        PARSE RI LINKS
        ========================= */

        lines.forEach(line => {

            if(
                line.includes("RiLink=")
                &&
                line.includes("RiPort=")
            ){

                let refs =
                [...line.matchAll(
/FieldReplaceableUnit=([^,]+),RiPort=([A-Z0-9_]+)/g
                )];



                if(refs.length >= 2){

                    let ref1Unit =
                    refs[0][1];

                    let ref1Port =
                    refs[0][2];

                    let ref2Unit =
                    refs[1][1];

                    let ref2Port =
                    refs[1][2];



                    let displayName = "";



                    /* =========================
                    MAIN BB LETTER PORTS
                    ========================= */

                    if(
                        /^[A-Z]$/.test(ref1Port)
                    ){

                        if(fruMap["1"]){

                            displayName =
                            fruMap["1"].display;
                        }

                        else if(
                            fruMap[ref1Unit]
                        ){

                            displayName =
                            fruMap[ref1Unit].display;
                        }
                    }



                    /* =========================
                    XMU / R503
                    ========================= */

                    else if(
                        ref1Unit.includes("XMU")
                    ){

                        if(
                            fruMap[ref1Unit]
                        ){

                            displayName =
                            fruMap[ref1Unit].display;
                        }
                    }



                    /* =========================
                    BB-01 / NORMAL BB
                    ========================= */

                    else{

                        if(
                            fruMap[ref1Unit]
                        ){

                            displayName =
                            fruMap[ref1Unit].display;
                        }
                    }



                    mappings.push({

                        displayName:
                        displayName,

                        ref1Unit:
                        ref1Unit,

                        ref1Port:
                        ref1Port,

                        ref2Unit:
                        ref2Unit,

                        ref2Port:
                        ref2Port

                    });
                }
            }

        });



        return mappings;
    }



    /* =========================
    PRE DATA
    ========================= */

    let preMappings = [];

    preMappings =
    preMappings.concat(parseData(pre1));

    preMappings =
    preMappings.concat(parseData(pre2));



    if(
        pre3.trim().toUpperCase() !== "NA"
    ){

        preMappings =
        preMappings.concat(parseData(pre3));
    }



    /* =========================
    POST DATA
    ========================= */

    let postMappings =
    parseData(post);




    /* =========================
    MATCH USING riPortRef2
    ========================= */

    preMappings.forEach(pre => {

        let matched =
        postMappings.find(postMap =>

            postMap.ref2Unit === pre.ref2Unit
            &&

            postMap.ref2Port === pre.ref2Port
        );



        if(matched){

            let preDisplay =
            `${pre.displayName} RiPort=${pre.ref1Port}`;

            let postDisplay =
            `${matched.displayName} RiPort=${matched.ref1Port}`;



            output +=
`Pre ${preDisplay} ---> Post ${postDisplay}\n`;

        }

    });



    /* =========================
    FINAL OUTPUT
    ========================= */

    document.getElementById("mappingOutput")
    .innerText = output;
}
/* =========================
RADIO SWAP
========================= */

function extractRadioData(text){

    let radios = [];

    let lines =
    text.split('\n');



    lines.forEach(line => {

        if(
            line.includes("FieldReplaceableUnit=")
            &&
            (
                line.includes("Radio")
                ||
                line.includes("RRUS")
            )
        ){

            /*
            Supports:

            Radio 4415
            Radio 4449
            RRUS32AB66A
            RRUS 32A B2

            Also supports empty/down RRU rows:
            FieldReplaceableUnit=RRU-11
            */

            let fullMatch =
            line.match(
/FieldReplaceableUnit=(\S+)\s+(.+)/
            );



            if(fullMatch){

                let rru =
                fullMatch[1]
                .trim();



                /* =========================
                NORMAL RRU
                ========================= */

                let normalMatch =
                line.match(
/FieldReplaceableUnit=(\S+)\s+(.+?)\s+(KRC\s+.+?)\s+\d+\s+([A-Z0-9]+)/i
                );



                if(normalMatch){

                    let product =
                    normalMatch[2]
                    .trim()
                    .replace(/\s+/g,' ');



                    let serial =
                    normalMatch[4]
                    .trim();



                    radios.push({

                        rru,
                        product,
                        serial

                    });
                }



                /* =========================
                DOWN / EMPTY RRU
                ========================= */

                else{

                    radios.push({

                        rru,
                        product:
                        "No Product Detected",

                        serial:
                        "No SL No Detected"

                    });
                }
            }
        }

    });



    return radios;
}




function checkRadioSwap(){

    let pre1 =
    document.getElementById("preBB1").value;

    let pre2 =
    document.getElementById("preBB2").value;

    let pre3 =
    document.getElementById("preBB3").value;

    let post =
    document.getElementById("postBB").value;



    let preCombined =
    pre1 + "\n" + pre2 + "\n" + pre3;



    let preRadios =
    extractRadioData(preCombined);

    let postRadios =
    extractRadioData(post);



    let output = "";



    /* =========================
    HEADER
    ========================= */

    output +=
    "RRU".padEnd(15) +

    "ProductName".padEnd(35) +

    "Pre Serial".padEnd(25) +

    "Post Serial".padEnd(25) +

    "Remark\n";



    output +=
    "=".repeat(120) + "\n";



    /* =========================
    COMPARE
    ========================= */

    preRadios.forEach(preRadio => {

        let postRadio =
        postRadios.find(p =>
            p.rru === preRadio.rru
        );



        let postSerial =
        "No SL No Detected";



        let remark =
        "No SL No in Post";



        if(postRadio){

            postSerial =
            postRadio.serial;



            if(
                preRadio.serial === postRadio.serial
            ){

                remark =
                "No Swap Observed";
            }

            else if(
                postRadio.serial ===
                "No SL No Detected"
            ){

                remark =
                "No SL No in Post";
            }

            else{

                remark =
                "Swap Detected";
            }
        }



        output +=

        preRadio.rru.padEnd(15) +

        preRadio.product.padEnd(35) +

        preRadio.serial.padEnd(25) +

        postSerial.padEnd(25) +

        remark +

        "\n";

    });



    document.getElementById("swapOutput")
    .innerText = output;
}
</script>

</body>
</html>
