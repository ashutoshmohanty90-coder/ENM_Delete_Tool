<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMO USA Command Portal</title>

<style>

body{
    margin:0;
    padding:0;
    background:#020617;
    color:white;
    font-family:Arial;
}

.container{
    width:90%;
    margin:auto;
    padding:40px;
}

h1{
    text-align:center;
    color:#00d4ff;
    font-size:50px;
    margin-bottom:40px;
}

.tabs{
    display:flex;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.tab-btn{
    background:#111827;
    color:white;
    border:none;
    padding:16px 28px;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

.tab-btn.active{
    background:#06b6d4;
    color:black;
}

.tab-content{
    display:none;
    background:#0f172a;
    padding:40px;
    border-radius:20px;
}

.tab-content.active{
    display:block;
}

h2{
    color:white;
    margin-bottom:30px;
    font-size:36px;
}

h3{
    margin-top:25px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:18px;
    margin-bottom:20px;
    border-radius:12px;
    border:1px solid #334155;
    background:#0b132b;
    color:white;
    font-size:18px;
    box-sizing:border-box;
}

textarea{
    width:100%;
    min-height:220px;
    padding:18px;
    margin-bottom:25px;
    border-radius:12px;
    border:1px solid #334155;
    background:#0b132b;
    color:white;
    font-size:14px;
    box-sizing:border-box;
    font-family:Consolas;
    line-height:1.5;
}

.btn-row{
    display:flex;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

button{
    background:#06b6d4;
    border:none;
    padding:16px 26px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

pre{
    background:black;
    padding:25px;
    border-radius:12px;
    overflow:auto;
    white-space:pre-wrap;
    font-size:15px;
    line-height:1.7;
    color:#00ff88;
}

</style>

</head>

<body>

<div class="container">

<h1>TMO USA Command Portal</h1>

<div class="tabs">

<button class="tab-btn active"
onclick="showTab('deleteTab', this)">
ENM Delete
</button>

<button class="tab-btn"
onclick="showTab('addTab', this)">
ENM Add
</button>

<button class="tab-btn"
onclick="showTab('mappingTab', this)">
RI Mapping / Radio Swap
</button>

</div>



<!-- =========================
ENM DELETE
========================= -->

<div id="deleteTab"
class="tab-content active">

<h2>ENM Node Delete</h2>

<input type="text"
id="deleteSite"
placeholder="Enter Site ID">

<div class="btn-row">

<button onclick="generateDelete()">
Generate Commands
</button>

<button onclick="copyText('deleteOutput')">
Copy
</button>

</div>

<pre id="deleteOutput"></pre>

</div>




<!-- =========================
ENM ADD
========================= -->

<div id="addTab"
class="tab-content">

<h2>ENM Node Add</h2>

<input type="text"
id="addSite"
placeholder="Enter Site ID">

<input type="text"
id="ipAddress"
placeholder="Enter IP Address">

<input type="text"
id="timeZone"
placeholder="Enter Time Zone">

<div class="btn-row">

<button onclick="generateAdd()">
Generate Commands
</button>

<button onclick="copyText('addOutput')">
Copy
</button>

</div>

<pre id="addOutput"></pre>

</div>




<!-- =========================
RI MAPPING
========================= -->

<div id="mappingTab"
class="tab-content">

<h2>RI Port Mapping & Radio Swap Check</h2>

<h3>Pre BB1 Data</h3>

<textarea id="preBB1"
placeholder="Paste PRE BB1 hget rilink riport + hget fi prod output"></textarea>

<h3>Pre BB2 Data</h3>

<textarea id="preBB2"
placeholder="Paste PRE BB2 hget rilink riport + hget fi prod output"></textarea>

<h3>Pre BB3 Data (Optional / NA)</h3>

<textarea id="preBB3"
placeholder="Paste PRE BB3 output OR type NA"></textarea>

<h3>Post G3 BB Data</h3>

<textarea id="postBB"
placeholder="Paste POST G3 BB hget rilink riport + hget fi prod output"></textarea>

<div class="btn-row">

<button onclick="generateMapping()">
Generate RI Mapping
</button>

<button onclick="checkRadioSwap()">
Check Radio Swap
</button>

<button onclick="copyText('mappingOutput')">
Copy Mapping
</button>

<button onclick="copyText('swapOutput')">
Copy Swap
</button>

</div>

<h3>RI Port Mapping</h3>

<pre id="mappingOutput"></pre>

<h3>Radio Swap Check</h3>

<pre id="swapOutput"></pre>

</div>

</div>




<script>

/* =========================
TAB SWITCH
========================= */

function showTab(tabId, btn){

    let tabs =
    document.querySelectorAll(".tab-content");

    tabs.forEach(tab => {
        tab.classList.remove("active");
    });

    document
    .getElementById(tabId)
    .classList.add("active");

    let buttons =
    document.querySelectorAll(".tab-btn");

    buttons.forEach(button => {
        button.classList.remove("active");
    });

    btn.classList.add("active");
}



/* =========================
COPY FUNCTION
========================= */

function copyText(id){

    let text =
    document.getElementById(id).innerText;

    navigator.clipboard.writeText(text);

    alert("Copied Successfully");
}



/* =========================
DELETE COMMAND
========================= */

function generateDelete(){

    let site =
    document.getElementById("deleteSite").value;

    let commands = `

cmedit get *${site}* FmAlarmsupervision.* ; Inventorysupervision.* ; pmFunction.*;cmNodeHeartbeatsupervision.*; cmFunction.* -t

cmedit set NetworkElement=${site},CmNodeHeartbeatSupervision=1 active=false

cmedit set NetworkElement=${site},InventorySupervision=1 active=false

fmedit set ${site} FmAlarmSupervision alarmSupervisionState=false

cmedit set NetworkElement=${site},PmFunction=1 pmEnabled=false

cmedit action NetworkElement=${site},CmFunction=1 deleteNrmDataFromEnm

cmedit delete NetworkElement=${site} –ALL --force

cmedit get NetworkElement=${site}

ap order -nv file:${site}.zip

ap status -n ${site}

`;

    document.getElementById("deleteOutput")
    .innerText = commands;
}



/* =========================
ADD COMMAND
========================= */

function generateAdd(){

    let site =
    document.getElementById("addSite").value;

    let ip =
    document.getElementById("ipAddress").value;

    let zone =
    document.getElementById("timeZone").value;

    let commands = `

cmedit create NetworkElement=${site} networkElementId=${site}, neType=RadioNode, ossPrefix="SubNetwork=ONRM_ROOT_MO,SubNetwork=Bloomfield,MeContext=${site}" -ns=OSS_NE_DEF -v=2.0.0

cmedit create NetworkElement=${site},ComConnectivityInformation=1 ComConnectivityInformationId=1, transportProtocol=TLS, ipAddress="${ip}", port=6513, snmpSecurityName=defaultsnmpuser, snmpVersion=SNMP_V3, snmpSecurityLevel=NO_AUTH_NO_PRIV -ns=COM_MED -v=1.1.0

secadm credentials create -sn prbs -sp "@WtIwQ-Bo2m0" -n ${site}

cmedit set NetworkElement=${site} timeZone=${zone}

cmedit set NetworkElement=${site} managementState=NORMAL

alarm enable ${site}

cmedit set NetworkElement=${site},SecurityFunction=1,NetworkElementSecurity=1 algorithmAndKeySize=RSA_2048, enrollmentMode=CMPv2_VC

cmedit set NetworkElement=${site},CmNodeHeartbeatSupervision=1 active=true

cmedit set NetworkElement=${site},InventorySupervision=1 active=true

fmedit set ${site} FmAlarmSupervision alarmSupervisionState=true

cmedit set NetworkElement=${site},PmFunction=1 pmEnabled=true

`;

    document.getElementById("addOutput")
    .innerText = commands;
}




/* =========================
CORRECT RI MAPPING
========================= */
<!-- REPLACE ONLY generateMapping() FUNCTION -->

function generateMapping(){

    let pre1 =
    document.getElementById("preBB1").value;

    let pre2 =
    document.getElementById("preBB2").value;

    let pre3 =
    document.getElementById("preBB3").value;

    let post =
    document.getElementById("postBB").value;

    let output = "";



    /* =========================
    PARSE DATA
    ========================= */

    function parseData(text){

        let lines = text.split('\n');

        let mappings = [];

        let currentBaseband = "";



        /* =========================
        DETECT BASEBAND
        Example:
        FieldReplaceableUnit=1 Baseband 6630
        ========================= */

        lines.forEach(line => {

            if(
                line.includes("FieldReplaceableUnit=1")
                &&
                line.includes("Baseband")
            ){

                let bbMatch =
                line.match(/Baseband\s+[A-Z0-9\- ]+/i);

                if(bbMatch){

                    currentBaseband =
                    bbMatch[0]
                    .replace(/\s+/g,' ')
                    .trim();
                }
            }

        });



        /* =========================
        DETECT RI LINKS
        ========================= */

        lines.forEach(line => {

            if(
                line.includes("RiLink=")
                &&
                line.includes("RiPort=")
            ){

                let allRefs =
                [...line.matchAll(
/FieldReplaceableUnit=([^,]+),RiPort=([A-Z0-9_]+)/g
                )];



                if(allRefs.length >= 2){

                    /* =========================
                    riPortRef1
                    ========================= */

                    let ref1Unit =
                    allRefs[0][1];

                    let ref1Port =
                    allRefs[0][2];



                    /* =========================
                    riPortRef2
                    ========================= */

                    let ref2Unit =
                    allRefs[1][1];

                    let ref2Port =
                    allRefs[1][2];



                    mappings.push({

                        baseband:
                        currentBaseband,

                        ref1Unit:
                        ref1Unit,

                        ref1Port:
                        ref1Port,

                        ref2Unit:
                        ref2Unit,

                        ref2Port:
                        ref2Port

                    });
                }
            }

        });

        return mappings;
    }



    /* =========================
    PRE DATA
    ========================= */

    let preMappings = [];

    preMappings =
    preMappings.concat(parseData(pre1));

    preMappings =
    preMappings.concat(parseData(pre2));

    if(
        pre3.trim().toUpperCase() !== "NA"
    ){

        preMappings =
        preMappings.concat(parseData(pre3));
    }



    /* =========================
    POST DATA
    ========================= */

    let postMappings =
    parseData(post);




    /* =========================
    MATCH USING riPortRef2
    ========================= */

    preMappings.forEach(pre => {

        let matched =
        postMappings.find(postMap =>

            postMap.ref2Unit === pre.ref2Unit
            &&

            postMap.ref2Port === pre.ref2Port
        );



        if(matched){

            output +=
`Pre ${pre.baseband} RiPort=${pre.ref1Port}
 ---> Post ${matched.baseband} RiPort=${matched.ref1Port}

`;

        }

    });



    /* =========================
    FINAL OUTPUT
    ========================= */

    document.getElementById("mappingOutput")
    .innerText = output;
}


/* =========================
RADIO SWAP
========================= */

function extractRadioData(text){

    let radios = [];

    let lines =
    text.split('\n');

    lines.forEach(line => {

        if(line.includes("FieldReplaceableUnit=")
        && line.includes("Radio")){

            let cols =
            line.trim().split(/\s+/);

            let rru =
            cols[0];

            let serial =
            cols[cols.length - 1];

            let product =
            cols.slice(1, cols.length - 4).join(" ");

            radios.push({
                rru,
                product,
                serial
            });
        }

    });

    return radios;
}



function checkRadioSwap(){

    let pre1 =
    document.getElementById("preBB1").value;

    let pre2 =
    document.getElementById("preBB2").value;

    let pre3 =
    document.getElementById("preBB3").value;

    let post =
    document.getElementById("postBB").value;

    let preCombined =
    pre1 + "\n" + pre2 + "\n" + pre3;

    let preRadios =
    extractRadioData(preCombined);

    let postRadios =
    extractRadioData(post);

    let output = "";

    output +=
"RRU | Product | Pre Serial | Post Serial | Remark\n";

    output +=
"====================================================================================\n";


    preRadios.forEach(preRadio => {

        let postRadio =
        postRadios.find(p =>
            p.rru === preRadio.rru
        );

        if(postRadio){

            let remark =
            preRadio.serial === postRadio.serial
            ? "No Swap Observed"
            : "NOK Swap Observed";

            output +=
`${preRadio.rru}
| ${preRadio.product}
| ${preRadio.serial}
| ${postRadio.serial}
| ${remark}

`;
        }

    });

    document.getElementById("swapOutput")
    .innerText = output;

}

</script>

</body>
</html>
